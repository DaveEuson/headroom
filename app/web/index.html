<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔆</text></svg>">
</head>
<body>
<main class="wrap">

  <header class="top">
    <!-- Clawdette: an original cute starburst critter -->
    <div id="mascot" class="mascot mood-happy" aria-hidden="true">
      <svg viewBox="0 0 120 132" width="104" height="114">
        <g class="m-legs" stroke="#d97757" stroke-width="7" stroke-linecap="round">
          <line class="m-leg-l" x1="51" y1="94" x2="48" y2="118"/>
          <line class="m-leg-r" x1="69" y1="94" x2="72" y2="118"/>
        </g>
        <g class="m-body">
          <!-- the spark: 11 irregular rays converging at the center -->
          <g class="m-spark" stroke="#d97757" stroke-width="10" stroke-linecap="round">
            <line x1="60" y1="56" x2="60" y2="17"/>
            <line x1="60" y1="56" x2="60" y2="25" transform="rotate(31 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="19" transform="rotate(64 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="24" transform="rotate(97 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="16" transform="rotate(129 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="25" transform="rotate(163 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="18" transform="rotate(196 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="24" transform="rotate(228 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="17" transform="rotate(262 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="25" transform="rotate(295 60 60)"/>
            <line x1="60" y1="56" x2="60" y2="19" transform="rotate(328 60 60)"/>
          </g>
          <circle cx="60" cy="60" r="15" fill="#d97757"/>
          <g class="m-face">
            <circle class="m-eye" cx="54" cy="57" r="2.8" fill="#2c1a12"/>
            <circle class="m-eye" cx="66" cy="57" r="2.8" fill="#2c1a12"/>
            <path class="m-mouth-smile" d="M54 65 Q60 70 66 65" fill="none"
                  stroke="#2c1a12" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="m-mouth-o" cx="60" cy="66" r="3.5" fill="#2c1a12"/>
          </g>
          <path class="m-sweat" d="M105 22 q6 9 0 13 q-6 -4 0 -13" fill="#7cc4fa"/>
        </g>
      </svg>
    </div>
    <div class="top-text">
      <h1>Claude Tracker</h1>
      <div class="sub">
        <span id="plan" class="chip" hidden></span>
        <span id="updated" class="muted">connecting…</span>
      </div>
    </div>
  </header>

  <div id="error" class="banner" hidden></div>

  <section id="meters" class="card meters" aria-label="Usage limits">
    <p class="muted loading">Waiting for first reading…</p>
  </section>

  <section id="battery-card" class="card battery" hidden aria-label="Pi battery">
    <div class="stat">
      <span class="stat-label">Pi battery</span>
      <span class="stat-value"><span id="batt-pct">–</span><span class="unit">%</span>
        <svg id="batt-bolt" class="bolt" hidden viewBox="0 0 24 24" width="16" height="16"
             fill="#fab219"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
      </span>
    </div>
    <div class="meter mini"><div id="batt-fill" class="fill"></div></div>
    <span id="batt-note" class="muted"></span>
  </section>

  <footer class="muted foot">
    Higher bar = more usage left · <a href="https://github.com/DaveEuson/ClaudeTrackerPi">ClaudeTrackerPi</a>
  </footer>

</main>
<script src="app.js"></script>
</body>
</html>
