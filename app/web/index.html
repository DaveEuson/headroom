<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔆</text></svg>">
</head>
<body>
<main class="wrap">

  <header class="top">
    <!-- Pip: a little retro computer (dances, codes, sleeps) -->
    <div id="mascot" class="mascot mood-happy" aria-hidden="true">
      <svg viewBox="0 0 120 132" width="100" height="110">
        <defs>
          <clipPath id="screen-clip">
            <rect x="31" y="27" width="58" height="36" rx="3"/>
          </clipPath>
        </defs>
        <g class="m-legs" stroke="#b5a78a" stroke-width="7" stroke-linecap="round">
          <line class="m-leg-l" x1="44" y1="88" x2="42" y2="112"/>
          <line class="m-leg-r" x1="76" y1="88" x2="78" y2="112"/>
        </g>
        <g class="m-body">
          <g class="m-arms" stroke="#b5a78a" stroke-width="6" stroke-linecap="round">
            <line class="m-arm-l" x1="22" y1="46" x2="9" y2="58"/>
            <line class="m-arm-r" x1="98" y1="46" x2="111" y2="58"/>
          </g>
          <!-- monitor -->
          <rect x="24" y="20" width="72" height="50" rx="6"
                fill="#e6dabf" stroke="#b9a67e" stroke-width="1.5"/>
          <rect x="31" y="27" width="58" height="36" rx="3" fill="#20201e"/>
          <!-- rainbow stripe chip -->
          <g>
            <rect x="33" y="65" width="6" height="3" fill="#43cc6e"/>
            <rect x="40" y="65" width="6" height="3" fill="#fab219"/>
            <rect x="47" y="65" width="6" height="3" fill="#e8883a"/>
            <rect x="54" y="65" width="6" height="3" fill="#e05252"/>
          </g>
          <!-- keyboard base -->
          <rect x="18" y="72" width="84" height="16" rx="4"
                fill="#e6dabf" stroke="#b9a67e" stroke-width="1.5"/>
          <g fill="#b9a67e">
            <rect x="25" y="76" width="8" height="3" rx="1"/>
            <rect x="36" y="76" width="8" height="3" rx="1"/>
            <rect x="47" y="76" width="8" height="3" rx="1"/>
            <rect x="58" y="76" width="8" height="3" rx="1"/>
            <rect x="69" y="76" width="8" height="3" rx="1"/>
            <rect x="80" y="76" width="8" height="3" rx="1"/>
            <rect x="30" y="81" width="8" height="3" rx="1"/>
            <rect x="41" y="81" width="8" height="3" rx="1"/>
            <rect x="52" y="81" width="18" height="3" rx="1"/>
            <rect x="73" y="81" width="8" height="3" rx="1"/>
          </g>
          <!-- screen content (green phosphor; amber/red via mood) -->
          <g clip-path="url(#screen-clip)">
            <g class="m-face">
              <g class="m-eyes-open m-phos">
                <rect x="48" y="37" width="5" height="8" rx="1"/>
                <rect x="67" y="37" width="5" height="8" rx="1"/>
              </g>
              <g class="m-shades m-phos">
                <rect x="44" y="38" width="12" height="7" rx="2"/>
                <rect x="64" y="38" width="12" height="7" rx="2"/>
                <rect x="55" y="39" width="10" height="2"/>
              </g>
              <path class="m-mouth-smile m-phos-s" d="M52 52 Q60 58 68 52"
                    fill="none" stroke-width="2.5" stroke-linecap="round"/>
              <rect class="m-mouth-flat m-phos" x="53" y="52" width="14"
                    height="2.5" rx="1"/>
              <circle class="m-mouth-o m-phos" cx="60" cy="53" r="3.5"/>
            </g>
            <g class="m-code m-phos">
              <rect class="m-line m-l1" x="36" y="31" width="24" height="2.5"/>
              <rect class="m-line m-l2" x="41" y="36" width="34" height="2.5"/>
              <rect class="m-line m-l3" x="41" y="41" width="18" height="2.5"/>
              <rect class="m-line m-l4" x="46" y="46" width="32" height="2.5"/>
              <rect class="m-line m-l5" x="41" y="51" width="26" height="2.5"/>
              <rect class="m-line m-l6" x="36" y="56" width="14" height="2.5"/>
              <rect class="m-cursor" x="53" y="56" width="5" height="3"/>
            </g>
            <g class="m-moon">
              <circle cx="60" cy="45" r="10" fill="#3f8f5c"/>
              <circle cx="65" cy="41" r="9" fill="#20201e"/>
            </g>
          </g>
          <g class="m-cap">
            <path d="M28 19 Q48 -2 88 5 L82 19 Z" fill="#6d5bd0"/>
            <circle cx="88" cy="6" r="5" fill="#f2efe9"/>
            <rect x="22" y="14" width="68" height="10" rx="5" fill="#8577e0"/>
          </g>
          <path class="m-sweat" d="M104 26 q6 9 0 13 q-6 -4 0 -13" fill="#7cc4fa"/>
        </g>
        <g class="m-zzz" fill="#8a8478" font-family="system-ui, sans-serif"
           font-weight="700" font-style="italic">
          <text class="m-z m-z1" x="96" y="34" font-size="10">z</text>
          <text class="m-z m-z2" x="103" y="26" font-size="13">z</text>
          <text class="m-z m-z3" x="110" y="19" font-size="15">z</text>
        </g>
      </svg>
    </div>
    <div class="top-text">
      <h1>Claude Tracker</h1>
      <div class="sub">
        <span id="plan" class="chip" hidden></span>
        <span id="updated" class="muted">connecting…</span>
      </div>
      <div class="sub">
        <a id="wifi-link" class="wifi-chip" href="/wifi">📶 Wi-Fi</a>
      </div>
    </div>
    <div class="clock">
      <div id="clock-time">–:–</div>
      <div id="clock-date" class="muted"></div>
    </div>
  </header>

  <div id="error" class="banner" hidden></div>

  <section id="meters" class="card meters" aria-label="Usage limits">
    <p class="muted loading">Waiting for first reading…</p>
  </section>

  <section id="battery-card" class="card battery" hidden aria-label="Pi battery">
    <div class="stat">
      <span class="stat-label">Pi battery</span>
      <span class="stat-value"><span id="batt-pct">–</span><span class="unit">%</span>
        <svg id="batt-bolt" class="bolt" hidden viewBox="0 0 24 24" width="16" height="16"
             fill="#fab219"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
      </span>
    </div>
    <div class="meter mini"><div id="batt-fill" class="fill"></div></div>
    <span id="batt-note" class="muted"></span>
  </section>

  <footer class="muted foot">
    <span id="bar-hint">Higher bar = more usage left</span> · <a href="/settings">Settings</a> ·
    <a href="/wifi">Wi-Fi</a> ·
    <a href="https://github.com/DaveEuson/ClaudeTrackerPi">ClaudeTrackerPi</a>
  </footer>

</main>
<script src="app.js"></script>
</body>
</html>
