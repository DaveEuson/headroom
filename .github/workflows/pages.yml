name: Deploy setup page

# Publishes docs/ (the browser flasher + setup page) to GitHub Pages, and
# bundles the latest release firmware into the site so the flasher fetches it
# same-origin (GitHub's release-asset host sends no CORS header, so a
# cross-origin fetch from the Pages site is blocked -> "Failed to fetch").
#
# One-time repo setup: Settings -> Pages -> Source = "GitHub Actions".
# Redeploys on docs changes and after every published release.

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bundle latest firmware images for the flasher (same-origin, no CORS)
        run: |
          base="https://github.com/${{ github.repository }}/releases/latest/download"
          for f in headroom-mini-bootloader.bin headroom-mini-partitions.bin \
                   headroom-mini-boot_app0.bin headroom-mini-app.bin; do
            curl -fsSL -o "docs/firmware/$f" "$base/$f" \
              || echo "::warning::missing $f in latest release (flasher Install 404s until a release with split images exists)"
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
