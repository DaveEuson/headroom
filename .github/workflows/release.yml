name: Build companion binaries

# Produces the double-click companion apps (no Python needed by end users).
# Runs when you push a tag like v1.0.0, and attaches the binaries to the
# GitHub Release so the device's setup page can link to them at
# /releases/latest/download/HeadroomCompanion-<os>[.exe].

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: HeadroomCompanion-windows.exe
          - os: macos-latest
            asset: HeadroomCompanion-macos
          - os: ubuntu-latest
            asset: HeadroomCompanion-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller certifi   # certifi -> bundled CA store (fixes macOS TLS)
      - name: Build
        working-directory: companion
        run: pyinstaller --onefile --name HeadroomCompanion --noconsole companion.py
      - name: Rename for the platform
        shell: bash
        run: |
          cd companion/dist
          if [ -f HeadroomCompanion.exe ]; then
            mv HeadroomCompanion.exe "${{ matrix.asset }}"
          else
            mv HeadroomCompanion "${{ matrix.asset }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: companion/dist/${{ matrix.asset }}

  # Flash images for the browser flasher (docs/ ESP Web Tools page).
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install platformio esptool
      - name: Build firmware
        working-directory: firmware
        run: pio run
      - name: Assemble flash images
        working-directory: firmware
        run: |
          BUILD=.pio/build/headroom-mini
          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 -name boot_app0.bin | head -1)
          mkdir -p out
          # Individual parts. The flasher writes these at their offsets and
          # skips the NVS region (0x9000), so saved Wi-Fi / pairing / settings
          # survive an update.
          cp "$BUILD/bootloader.bin" out/headroom-mini-bootloader.bin
          cp "$BUILD/partitions.bin" out/headroom-mini-partitions.bin
          cp "$BOOT_APP0"            out/headroom-mini-boot_app0.bin
          cp "$BUILD/firmware.bin"   out/headroom-mini-app.bin
          # Single full-flash image for esptool / manual users.
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode keep --flash_freq keep --flash_size keep \
            -o out/headroom-mini-merged.bin \
            0x0     "$BUILD/bootloader.bin" \
            0x8000  "$BUILD/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$BUILD/firmware.bin"
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-images
          path: firmware/out/*

  release:
    needs: [build, firmware]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # Redeploy the browser flasher with THIS release's firmware. Done here in the
  # same run (not via pages.yml's `release` trigger) because a release published
  # by the Actions bot does not trigger other workflows — so pages.yml would
  # never fire and the flasher would keep serving the previous version.
  pages:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Bundle this release's firmware into the flasher (same-origin)
        uses: actions/download-artifact@v4
        with:
          name: firmware-images
          path: docs/firmware
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
