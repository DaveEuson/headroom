; Headroom Mini — firmware for the Waveshare ESP32-S3-Touch-LCD-2
; (ESP32-S3R8, 16MB flash, 8MB octal PSRAM, 2" ST7789 240x320 IPS, CST816D touch)
;
; Build:   pio run
; Flash:   pio run -t upload        (board plugged in via USB-C)
; Monitor: pio device monitor

[env:headroom-mini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ESP32-S3R8: 16MB QIO flash + 8MB octal PSRAM
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM
    ; Serial over the native USB-C port
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.4.7
    bblanchon/ArduinoJson@^7.0.4
